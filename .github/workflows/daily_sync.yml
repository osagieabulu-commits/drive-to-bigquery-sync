name: Daily Google Drive to BigQuery Sync

on:
  schedule:
    # This is "Cron" format. 0 9 * * * means 9:00 AM UTC every day.
    - cron: '0 11 * * *'
  workflow_dispatch: # This adds the "Run workflow" button so you can test it manually

jobs:
  run-sync-task:
    runs-on: ubuntu-latest # This tells GitHub to use a Linux cloud computer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Pulls your code from the repo onto the cloud computer

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt # Installs everything listed in your requirements.txt

      - name: Run the script
        env:
          # This connects your secret JSON to the script
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: python main.py
